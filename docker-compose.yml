services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: clinica_venezuela
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: clinica_venezuela
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: clinica_secret_venezuela_2024
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  
  frontend:
    build: ./frontend
    environment:
      REACT_APP_API_URL: http://backend:3000
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data: